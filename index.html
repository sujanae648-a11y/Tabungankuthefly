        <section class="glass-card rounded-3xl p-6 mb-6 animate-slide-up">

                    <p class="text-sm text-slate-500 font-medium mb-1">Sisa Saldo (Bulan Ini)</p>

                </div>

            <div id="expense-section" class="space-y-4 hidden">

                <form id="expense-form" class="glass-card rounded-2xl p-4 space-y-3">

                    </div>

                        <div class="relative w-full">

                        Catat Pengeluaran 💸

    <!-- JavaScript Logic (In-Memory State) -->
    <script>
        // --- State Variables (In-Memory for this session) ---
        let initialBalance = 2500000; // Saldo awal simulasi
        let targetSavings = 5000000;
        
        let schedules = [
            { id: 1, text: "Kuliah Pagi/Kerja", time: "08:00", done: false },
            { id: 2, text: "Olahraga tipis-tipis", time: "16:30", done: false }
        ];
        
        let expenses = [];

        // --- Utility Functions ---
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        const updateDate = () => {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);
        };

        // --- UI Update Functions ---
        const updateDashboard = () => {
            const totalExpense = expenses.reduce((sum, item) => sum + item.amount, 0);
            const currentBalance = initialBalance - totalExpense;
            
            document.getElementById('total-balance').textContent = formatRupiah(currentBalance);
            
            // Simulasi progress nabung (berdasarkan saldo sisa)
            let progress = (currentBalance / targetSavings) * 100;
            if (progress > 100) progress = 100;
            if (progress < 0) progress = 0;
            
            document.getElementById('savings-bar').style.width = `${progress}%`;
            document.getElementById('savings-progress-text').textContent = `${Math.round(progress)}%`;

            // Peringatan jika saldo menipis
            const balanceEl = document.getElementById('total-balance');
            if (currentBalance < 500000) {
                balanceEl.classList.remove('text-slate-800');
                balanceEl.classList.add('text-pink-600');
            } else {
                balanceEl.classList.add('text-slate-800');
                balanceEl.classList.remove('text-pink-600');
            }
        };

        const renderSchedules = () => {
            const listEl = document.getElementById('schedule-list');
            listEl.innerHTML = '';

            if (schedules.length === 0) {
                listEl.innerHTML = `<div class="text-center p-6 text-slate-500 text-sm">Yah, belum ada jadwal nih. Rebahan aja? 🛌</div>`;
                return;
            }

            // Sort by time
            schedules.sort((a, b) => a.time.localeCompare(b.time));

            schedules.forEach(sched => {
                const item = document.createElement('div');
                item.className = `glass-card p-4 rounded-2xl flex items-center justify-between group transition-all ${sched.done ? 'opacity-60 bg-white/30' : ''}`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <button onclick="toggleSchedule(${sched.id})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${sched.done ? 'bg-green-400 border-green-400 text-white' : 'border-indigo-300 hover:border-indigo-500 text-transparent'}">
                            <i class="ph ph-check font-bold text-xs"></i>
                        </button>
                        <div>
                            <p class="text-sm font-semibold ${sched.done ? 'line-through text-slate-500' : 'text-slate-700'}">${sched.text}</p>
                            <p class="text-xs text-indigo-500 font-medium"><i class="ph ph-clock mr-1"></i>${sched.time}</p>
                        </div>
                    </div>
                    <button onclick="deleteSchedule(${sched.id})" class="text-slate-300 hover:text-pink-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="ph ph-trash text-lg"></i>
                    </button>
                `;
                listEl.appendChild(item);
            });
        };

        const renderExpenses = () => {
            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';

            if (expenses.length === 0) {
                listEl.innerHTML = `<div class="text-center p-6 text-slate-500 text-sm">Keren! Belum ada pengeluaran. Pertahankan! 🤑</div>`;
                return;
            }

            // Reverse to show newest first
            [...expenses].reverse().forEach(exp => {
                const item = document.createElement('div');
                item.className = `glass-card p-4 rounded-2xl flex items-center justify-between group`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-white/50 flex items-center justify-center text-lg shadow-sm">
                            ${exp.category.split(' ')[0]}
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-700">${exp.desc}</p>
                            <p class="text-xs text-slate-500">${exp.category.substring(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-sm font-bold text-pink-500">- ${formatRupiah(exp.amount)}</span>
                        <button onclick="deleteExpense(${exp.id})" class="text-slate-300 hover:text-pink-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                `;
                listEl.appendChild(item);
            });
        };

        // --- Action Handlers ---
        document.getElementById('schedule-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const textInput = document.getElementById('schedule-input');
            const timeInput = document.getElementById('schedule-time');
            
            if(textInput.value && timeInput.value) {
                schedules.push({
                    id: Date.now(),
                    text: textInput.value,
                    time: timeInput.value,
                    done: false
                });
                textInput.value = '';
                timeInput.value = '';
                renderSchedules();
            }
        });

        document.getElementById('expense-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const descInput = document.getElementById('expense-desc');
            const amountInput = document.getElementById('expense-amount');
            const catInput = document.getElementById('expense-category');
            
            if(descInput.value && amountInput.value) {
                expenses.push({
                    id: Date.now(),
                    desc: descInput.value,
                    amount: parseInt(amountInput.value),
                    category: catInput.value
                });
                descInput.value = '';
                amountInput.value = '';
                renderExpenses();
                updateDashboard();
            }
        });

        // Make functions globally available for inline onclick
        window.toggleSchedule = (id) => {
            const sched = schedules.find(s => s.id === id);
            if(sched) {
                sched.done = !sched.done;
                renderSchedules();
            }
        };

        window.deleteSchedule = (id) => {
            schedules = schedules.filter(s => s.id !== id);
            renderSchedules();
        };

        window.deleteExpense = (id) => {
            expenses = expenses.filter(e => e.id !== id);
            renderExpenses();
            updateDashboard();
        };

        window.switchTab = (tab) => {
            const schedSec = document.getElementById('schedule-section');
            const expSec = document.getElementById('expense-section');
            const btnSched = document.getElementById('tab-schedule');
            const btnExp = document.getElementById('tab-expense');

            if (tab === 'schedule') {
                schedSec.classList.remove('hidden');
                expSec.classList.add('hidden');
                
                btnSched.classList.add('tab-active');
                btnSched.classList.remove('text-slate-600', 'bg-transparent');
                
                btnExp.classList.remove('tab-active');
                btnExp.classList.add('text-slate-600', 'bg-transparent');
            } else {
                expSec.classList.remove('hidden');
                schedSec.classList.add('hidden');
                
                btnExp.classList.add('tab-active');
                btnExp.classList.remove('text-slate-600', 'bg-transparent');
                
                btnSched.classList.remove('tab-active');
                btnSched.classList.add('text-slate-600', 'bg-transparent');
            }
        };

        // --- Initialization ---
        updateDate();
        updateDashboard();
        renderSchedules();
        renderExpenses();

    </script>
</body>
</html>
